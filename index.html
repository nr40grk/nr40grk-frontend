<script>
  // Loader
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hide');
      // Trigger link entrance animations
      setTimeout(() => {
        document.querySelectorAll('.hub-link').forEach(el => el.classList.add('visible'));
      }, 400);
    }, 900);
  });

  // Lang toggle (hub-specific, no full applyLang needed for this minimal page)
  let hubLang = localStorage.getItem('lang') || 'gr';
  const langBtn = document.getElementById('langBtn');

  function applyHubLang() {
    document.querySelectorAll('[data-gr]').forEach(el => {
      const val = el.getAttribute('data-' + hubLang);
      if (!val) return;
      if (val.includes('<')) el.innerHTML = val;
      else el.textContent = val;
    });
    langBtn.textContent = hubLang === 'gr' ? 'EN' : 'ΕΛ';
  }

  langBtn.addEventListener('click', () => {
    hubLang = hubLang === 'gr' ? 'en' : 'gr';
    localStorage.setItem('lang', hubLang);
    applyHubLang();
  });

  applyHubLang();
</script>
